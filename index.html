<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport: previne zoom indesejado em inputs no iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ── PWA: Tema e cores ── -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="background-color" content="#0a0f1a" />

    <!-- ── PWA: Modo standalone (remove barra do browser) ── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Semestre" />

    <!-- ── PWA: Microsoft / Windows ── -->
    <meta name="msapplication-TileColor" content="#6366f1" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- ── SEO básico ── -->
    <meta name="description" content="Controle suas disciplinas, notas e metas acadêmicas do semestre." />
    <meta name="application-name" content="Controle do Semestre" />

    <!-- Título -->
    <title>Controle do Semestre</title>

    <!-- ── Manifest PWA ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── Apple Touch Icons (iOS) ── -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.svg" />

    <!-- ── Splash screens iOS (safe area) ── -->
    <!-- O iOS gera splash automaticamente a partir do apple-touch-icon + background_color -->
    <meta name="apple-touch-fullscreen" content="yes" />

    <!-- ── Fonte: DM Sans ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
